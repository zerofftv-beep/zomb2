name: DayZZombies
version: 1.0.0
main: com.dayzombies.DayZZombies
api-version: 1.20
author: ArenaAgent
description: Плагин для DayZ сервера на базе Arclight 1.20.1 (настройка зомби, кастомный спавн, слух и реакция на оружие TacZ).

commands:
  dayzombies:
    description: Основная команда управления плагином DayZZombies.
    aliases: [dz, dayz]
    permission: dayzzombies.admin
    usage: /dayzombies help

permissions:
  dayzzombies.admin:
    description: Позволяет изменять настройки зомби через команды.
    default: op
